services:
  thiscrow:
    image: azizhankaya/thiscrow
    container_name: thiscrow
    restart: always
    env_file:
      - .env
    ports:
      - "8080:8080"
      - "8081:8081"
    volumes:
      - data:/data
    depends_on:
      - db
  db:
    image: postgres:15.2-alpine
    restart: always
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: thiscrow
      POSTGRES_USER: postgres
    volumes:
      - db:/var/lib/postgresql/data

volumes:
  db:
    driver: local
  data:
    driver: local
